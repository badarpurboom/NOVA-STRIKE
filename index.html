<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA STRIKE - ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #c { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; font-size: 1rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; display: flex; gap: 20px; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,20,40,0.8) 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; }
        #level-up { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 3rem; color: #fff; text-shadow: 0 0 30px #00f2ff; z-index: 15; pointer-events: none; opacity: 0; transition: 0.5s; font-weight: bold; }
        h1 { font-size: 3.5rem; color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin-bottom: 2rem; letter-spacing: 8px; }
        .btn { padding: 1.2rem 3rem; font-size: 1.5rem; font-family: 'Orbitron', sans-serif; background: transparent; border: 3px solid #00f2ff; color: #00f2ff; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }
        #msg { margin-top: 1rem; color: #aaa; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui"><div>SCORE: <span id="score">0</span></div><div>LEVEL: <span id="level">1</span></div><div>LIVES: <span id="lives">3</span></div></div>
    <div id="level-up">LEVEL UP!</div>
    <div id="overlay"><h1 id="title">NOVA STRIKE</h1><div id="stats" style="display:none; margin-bottom: 1rem;">FINAL SCORE: <span id="final-score">0</span></div><button id="start-btn" class="btn">LAUNCH MISSION</button><div id="msg">AUTO-FIRING ELITE ENIGMA</div></div>
    <canvas id="c"></canvas>
    <script>
        class Sound {
            constructor() { this.ctx = null; }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            shoot() { if (!this.ctx) return; const osc = this.ctx.createOscillator(), g = this.ctx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(880, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(110, this.ctx.currentTime+0.1); g.gain.setValueAtTime(0.05, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime+0.1); osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime+0.1); }
            explode() { if (!this.ctx) return; const osc = this.ctx.createOscillator(), g = this.ctx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(1, this.ctx.currentTime+0.3); g.gain.setValueAtTime(0.15, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime+0.3); osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime+0.3); }
            levelUp() { if (!this.ctx) return; [440,554,659,880].forEach((f, i) => { const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.frequency.value = f; g.gain.setValueAtTime(0.05, this.ctx.currentTime+i*0.1); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime+i*0.1+0.1); o.connect(g); g.connect(this.ctx.destination); o.start(this.ctx.currentTime+i*0.1); o.stop(this.ctx.currentTime+i*0.1+0.1); }); }
        }
        const sfx = new Sound();
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d'), overlay = document.getElementById('overlay');
        const levelUpEl = document.getElementById('level-up'), startBtn = document.getElementById('start-btn'), scoreEl = document.getElementById('score'), levelEl = document.getElementById('level'), livesEl = document.getElementById('lives'), finalScoreEl = document.getElementById('final-score'), titleEl = document.getElementById('title'), statsEl = document.getElementById('stats');
        let w, h, player, stars = [], enemies = [], bullets = [], particles = [], score = 0, level = 1, lives = 3, active = false, spawnChance = 0.03, nextLevelScore = 2500;
        let lastShotTime = 0, fireRate = 180;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; if(player) { player.x = w/2; player.y = h-100; } }
        window.onresize = resize; resize();
        class Player {
            constructor() { this.x = w/2; this.y = h-100; this.tx = this.x; this.ty = this.y; }
            update() { this.x += (this.tx - this.x) * 0.15; this.y += (this.ty - this.y) * 0.15; }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff'; ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(25, 25); ctx.lineTo(-25, 25); ctx.closePath(); ctx.stroke(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 5, 6, 0, 7); ctx.fill(); ctx.restore(); }
        }
        class Enemy {
            constructor() {
                this.x = Math.random()*w; this.y = -50; this.level = level;
                this.type = 'basic'; this.hp = 1; this.speed = 2 + Math.random()*2; this.w = 20; this.h = 20; this.color = '#ff0055';
                if(level >= 2 && Math.random() < 0.3) { this.type='scout'; this.speed += 2; this.color='#00ff88'; }
                if(level >= 3 && Math.random() < 0.2) { this.type='guardian'; this.hp=2; this.w=40; this.h=40; this.speed=1.5; this.color='#ffaa00'; }
                if(level >= 4 && Math.random() < 0.15) { this.type='hunter'; this.color='#aa00ff'; this.speed=2.5; }
                this.speed *= (1 + (level-1)*0.15);
            }
            update() {
                this.y += this.speed;
                if(this.type==='scout') this.x += Math.sin(this.y/20)*5;
                if(this.type==='hunter' && player) { this.x += (player.x - this.x) * 0.02; }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 3;
                if(this.type==='guardian') { ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h); if(this.hp>1) { ctx.fillStyle=this.color; ctx.fillRect(-10,-10,20,20); } }
                else { ctx.beginPath(); ctx.moveTo(-this.w,0); ctx.lineTo(0,-this.h); ctx.lineTo(this.w,0); ctx.lineTo(0,this.h); ctx.closePath(); ctx.stroke(); }
                ctx.restore();
            }
        }
        function createExplosion(x, y, color) { sfx.explode(); for(let i=0; i<15; i++) { particles.push({ x, y, sx: Math.random()*8-4, sy: Math.random()*8-4, a: 1, c: color }); } }
        function triggerLevelUp() { level++; levelEl.innerText = level; spawnChance = Math.min(0.12, 0.03 + (level-1)*0.015); nextLevelScore += level * 2500; fireRate = Math.max(80, 180 - (level-1)*15); sfx.levelUp(); levelUpEl.style.opacity = '1'; setTimeout(() => levelUpEl.style.opacity = '0', 2000); }
        function shoot() { if(active) { bullets.push({ x: player.x, y: player.y - 30 }); sfx.shoot(); } }
        function init() {
            player = new Player(); stars = Array(120).fill(0).map(() => ({ x: Math.random()*w, y: Math.random()*h, s: 0.5 + Math.random()*2 }));
            const move = (ex, ey) => { if(active) { player.tx = ex; player.ty = ey-50; } };
            window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
            window.addEventListener('touchmove', e => { move(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
            startBtn.addEventListener('click', () => { sfx.init(); active = true; score = 0; level = 1; lives = 3; spawnChance = 0.03; nextLevelScore = 2500; fireRate = 180; enemies = []; bullets = []; particles = []; scoreEl.innerText = score; levelEl.innerText = level; livesEl.innerText = lives; overlay.style.display = 'none'; statsEl.style.display = 'none'; });
            loop(0);
        }
        function loop(timestamp) {
            ctx.fillStyle = '#00081a'; ctx.fillRect(0,0,w,h);
            stars.forEach(s => { ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, 2, 2); s.y += s.s; if(s.y > h) s.y = 0; });
            if(active) {
                player.update(); player.draw(); if(Math.random() < spawnChance) enemies.push(new Enemy());
                if(timestamp - lastShotTime > fireRate) { shoot(); lastShotTime = timestamp; }
                enemies.forEach((e, i) => {
                    e.update(); e.draw();
                    if(Math.hypot(e.x - player.x, e.y - player.y) < (e.w + 20)) { enemies.splice(i, 1); lives--; livesEl.innerText = lives; createExplosion(player.x, player.y, '#00f2ff'); if(lives <= 0) { active = false; overlay.style.display = 'flex'; titleEl.innerText = 'MISSION FAILED'; statsEl.style.display = 'block'; finalScoreEl.innerText = score; startBtn.innerText = 'RETRY MISSION'; } }
                    bullets.forEach((b, j) => {
                        if(Math.hypot(e.x - b.x, e.y - b.y) < (e.w + 10)) {
                            e.hp--; bullets.splice(j, 1);
                            if(e.hp <= 0) { enemies.splice(i, 1); score += (e.type==='basic'?100:250); scoreEl.innerText = score; createExplosion(e.x, e.y, e.color); if(score >= nextLevelScore) triggerLevelUp(); }
                        }
                    });
                    if(e.y > h + 50) enemies.splice(i, 1);
                });
                bullets.forEach((b, i) => { b.y -= 12; ctx.fillStyle = '#00f2ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00f2ff'; ctx.fillRect(b.x-2, b.y, 4, 15); if(b.y < -50) bullets.splice(i, 1); });
                particles.forEach((p, i) => { p.x += p.sx; p.y += p.sy; p.a -= 0.02; ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill(); ctx.globalAlpha = 1; if(p.a <= 0) particles.splice(i, 1); });
            }
            requestAnimationFrame(loop);
        }
        init();
    </script>
</body>
</html>
