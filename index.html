<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Nova Strike - An elite space shooter game with auto-firing mechanics and progressive difficulty.">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>NOVA STRIKE - ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100%; width: 100%; position: fixed; top: 0; left: 0; }
        #c { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD */
        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            pointer-events: none; z-index: 10;
            font-size: clamp(0.6rem, 2.5vw, 1rem);
            color: #00f2ff; text-shadow: 0 0 10px #00f2ff;
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            gap: 8px;
            padding-top: max(8px, env(safe-area-inset-top));
        }
        #ui div { white-space: nowrap; }

        /* Level Up */
        #level-up {
            position: absolute; top: 35%; width: 100%; text-align: center;
            font-size: clamp(1.5rem, 6vw, 3rem);
            color: #fff; text-shadow: 0 0 30px #00f2ff;
            z-index: 15; pointer-events: none; opacity: 0;
            transition: 0.5s; font-weight: bold;
        }

        /* Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,20,40,0.85) 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; padding: 20px;
        }
        h1 {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            color: #00f2ff; text-shadow: 0 0 20px #00f2ff;
            margin-bottom: 1.5rem; letter-spacing: clamp(3px, 1.5vw, 8px);
        }
        .btn {
            padding: clamp(0.8rem, 2.5vw, 1.2rem) clamp(1.5rem, 5vw, 3rem);
            font-size: clamp(0.9rem, 3.5vw, 1.5rem);
            font-family: 'Orbitron', sans-serif;
            background: transparent; border: 3px solid #00f2ff; color: #00f2ff;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            border-radius: 4px; min-width: 200px;
        }
        .btn:hover, .btn:active { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }
        #msg {
            margin-top: 1rem; color: #aaa;
            font-size: clamp(0.55rem, 2vw, 0.8rem);
            letter-spacing: 2px;
        }
        #stats {
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: #00f2ff; margin-bottom: 1rem;
        }

        /* Mobile touch zone indicator */
        #touch-zone {
            display: none;
            position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
            z-index: 5; pointer-events: none;
        }
        @media (hover: none) and (pointer: coarse) {
            #touch-zone { display: block; }
        }

        /* Pause button for mobile */
        #pause-btn {
            display: none;
            position: absolute; top: max(8px, env(safe-area-inset-top)); right: 12px;
            z-index: 25; background: rgba(0, 242, 255, 0.15);
            border: 2px solid rgba(0, 242, 255, 0.4);
            color: #00f2ff; font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 2.5vw, 0.9rem);
            padding: 6px 14px; cursor: pointer; border-radius: 4px;
        }
        @media (hover: none) and (pointer: coarse) {
            #pause-btn { display: block; }
        }

        /* Fullscreen button */
        #fs-btn {
            display: none;
            position: absolute; bottom: max(12px, env(safe-area-inset-bottom)); right: 12px;
            z-index: 25; background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: #00f2ff; font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem; padding: 5px 10px; cursor: pointer; border-radius: 4px;
        }
        @media (hover: none) and (pointer: coarse) {
            #fs-btn { display: block; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>LVL: <span id="level">1</span></div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>
    <div id="level-up">LEVEL UP!</div>
    <button id="pause-btn">⏸</button>
    <button id="fs-btn">⛶ FULL</button>
    <div id="touch-zone"></div>
    <div id="overlay">
        <h1 id="title">NOVA STRIKE</h1>
        <div id="stats" style="display:none">FINAL SCORE: <span id="final-score">0</span></div>
        <button id="start-btn" class="btn">LAUNCH MISSION</button>
        <div id="msg">AUTO-FIRING ELITE ENIGMA</div>
    </div>
    <canvas id="c"></canvas>

    <script>
        // ───── Sound Engine ─────
        class Sound {
            constructor() { this.ctx = null; }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    if (this.ctx.state === 'suspended') this.ctx.resume();
                }
            }
            shoot() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, this.ctx.currentTime + 0.1);
                g.gain.setValueAtTime(0.05, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(g); g.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
            explode() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(1, this.ctx.currentTime + 0.3);
                g.gain.setValueAtTime(0.15, this.ctx.currentTime);
                g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(g); g.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            }
            levelUp() {
                if (!this.ctx) return;
                [440, 554, 659, 880].forEach((f, i) => {
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0.05, this.ctx.currentTime + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.1 + 0.1);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(this.ctx.currentTime + i * 0.1);
                    o.stop(this.ctx.currentTime + i * 0.1 + 0.1);
                });
            }
        }
        const sfx = new Sound();

        // ───── Core Setup ─────
        const canvas = document.getElementById('c');
        const ctx2d = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const levelUpEl = document.getElementById('level-up');
        const startBtn = document.getElementById('start-btn');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('final-score');
        const titleEl = document.getElementById('title');
        const statsEl = document.getElementById('stats');
        const pauseBtn = document.getElementById('pause-btn');
        const fsBtn = document.getElementById('fs-btn');

        let w, h, dpr;
        let player, stars = [], enemies = [], bullets = [], particles = [];
        let score = 0, level = 1, lives = 3, active = false, paused = false;
        let spawnChance = 0.03, nextLevelScore = 2500;
        let lastShotTime = 0, fireRate = 180;
        let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // ───── Responsive Canvas ─────
        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
            if (player) {
                player.x = Math.min(player.x, w - 25);
                player.y = Math.min(player.y, h - 25);
            }
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 200));
        resize();

        // ───── Scale Factor for mobile ─────
        function getScale() {
            return Math.min(w / 400, h / 700, 1.5);
        }

        // ───── Player ─────
        class Player {
            constructor() {
                this.x = w / 2;
                this.y = h - (isMobile ? 130 : 100);
                this.tx = this.x;
                this.ty = this.y;
            }
            update() {
                this.x += (this.tx - this.x) * 0.15;
                this.y += (this.ty - this.y) * 0.15;
                // Keep player in bounds
                this.x = Math.max(25, Math.min(w - 25, this.x));
                this.y = Math.max(30, Math.min(h - 25, this.y));
            }
            draw() {
                const s = getScale();
                const sz = 25 * s;
                ctx2d.save();
                ctx2d.translate(this.x, this.y);
                ctx2d.shadowBlur = 20;
                ctx2d.shadowColor = '#00f2ff';
                ctx2d.strokeStyle = '#00f2ff';
                ctx2d.lineWidth = Math.max(2, 4 * s);
                ctx2d.beginPath();
                ctx2d.moveTo(0, -sz);
                ctx2d.lineTo(sz, sz);
                ctx2d.lineTo(-sz, sz);
                ctx2d.closePath();
                ctx2d.stroke();
                ctx2d.fillStyle = '#fff';
                ctx2d.beginPath();
                ctx2d.arc(0, 5 * s, 6 * s, 0, 7);
                ctx2d.fill();
                // Thruster glow
                ctx2d.fillStyle = 'rgba(0, 242, 255, 0.3)';
                ctx2d.beginPath();
                ctx2d.moveTo(-10 * s, sz);
                ctx2d.lineTo(10 * s, sz);
                ctx2d.lineTo(0, sz + 15 * s + Math.random() * 8 * s);
                ctx2d.closePath();
                ctx2d.fill();
                ctx2d.restore();
            }
        }

        // ───── Enemy ─────
        class Enemy {
            constructor() {
                const s = getScale();
                this.x = 30 + Math.random() * (w - 60);
                this.y = -50;
                this.level = level;
                this.type = 'basic';
                this.hp = 1;
                this.speed = (2 + Math.random() * 2) * s;
                this.w = 20 * s;
                this.h = 20 * s;
                this.color = '#ff0055';

                if (level >= 2 && Math.random() < 0.3) {
                    this.type = 'scout'; this.speed += 2 * s; this.color = '#00ff88';
                }
                if (level >= 3 && Math.random() < 0.2) {
                    this.type = 'guardian'; this.hp = 2; this.w = 40 * s; this.h = 40 * s; this.speed = 1.5 * s; this.color = '#ffaa00';
                }
                if (level >= 4 && Math.random() < 0.15) {
                    this.type = 'hunter'; this.color = '#aa00ff'; this.speed = 2.5 * s;
                }
                this.speed *= (1 + (level - 1) * 0.15);
            }
            update() {
                this.y += this.speed;
                if (this.type === 'scout') this.x += Math.sin(this.y / 20) * 5;
                if (this.type === 'hunter' && player) this.x += (player.x - this.x) * 0.02;
            }
            draw() {
                ctx2d.save();
                ctx2d.translate(this.x, this.y);
                ctx2d.shadowBlur = 15;
                ctx2d.shadowColor = this.color;
                ctx2d.strokeStyle = this.color;
                ctx2d.lineWidth = Math.max(2, 3 * getScale());
                if (this.type === 'guardian') {
                    ctx2d.strokeRect(-this.w / 2, -this.h / 2, this.w, this.h);
                    if (this.hp > 1) {
                        ctx2d.fillStyle = this.color;
                        ctx2d.fillRect(-this.w * 0.25, -this.h * 0.25, this.w * 0.5, this.h * 0.5);
                    }
                } else {
                    ctx2d.beginPath();
                    ctx2d.moveTo(-this.w, 0);
                    ctx2d.lineTo(0, -this.h);
                    ctx2d.lineTo(this.w, 0);
                    ctx2d.lineTo(0, this.h);
                    ctx2d.closePath();
                    ctx2d.stroke();
                }
                ctx2d.restore();
            }
        }

        // ───── Effects ─────
        function createExplosion(x, y, color) {
            sfx.explode();
            const count = isMobile ? 10 : 15;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    sx: Math.random() * 8 - 4,
                    sy: Math.random() * 8 - 4,
                    a: 1, c: color
                });
            }
        }

        function triggerLevelUp() {
            level++;
            levelEl.innerText = level;
            spawnChance = Math.min(0.12, 0.03 + (level - 1) * 0.015);
            nextLevelScore += level * 2500;
            fireRate = Math.max(80, 180 - (level - 1) * 15);
            sfx.levelUp();
            levelUpEl.style.opacity = '1';
            setTimeout(() => levelUpEl.style.opacity = '0', 2000);
        }

        function shoot() {
            if (active && !paused) {
                bullets.push({ x: player.x, y: player.y - 30 * getScale() });
                sfx.shoot();
            }
        }

        // ───── Game Over / Restart ─────
        function gameOver() {
            active = false;
            overlay.style.display = 'flex';
            titleEl.innerText = 'MISSION FAILED';
            statsEl.style.display = 'block';
            finalScoreEl.innerText = score;
            startBtn.innerText = 'RETRY MISSION';
        }

        // ───── Controls ─────
        function initControls() {
            const move = (ex, ey) => {
                if (active && !paused) {
                    player.tx = ex;
                    player.ty = ey - (isMobile ? 70 : 50);
                }
            };

            // Mouse
            window.addEventListener('mousemove', e => move(e.clientX, e.clientY));

            // Touch — improved handling
            window.addEventListener('touchstart', e => {
                if (!active) return; // Allow buttons to work when game is not active
                if (paused) return;
                
                const t = e.touches[0];
                move(t.clientX, t.clientY);
                
                // Only prevent default if we are actually playing
                if (active) e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchmove', e => {
                if (active && !paused) {
                    const t = e.touches[0];
                    move(t.clientX, t.clientY);
                    e.preventDefault();
                }
            }, { passive: false });

            // Prevent context menu on long press
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Pause
            pauseBtn.addEventListener('click', () => {
                if (!active) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶' : '⏸';
            });
            pauseBtn.addEventListener('touchend', e => e.stopPropagation());

            // Fullscreen
            fsBtn.addEventListener('click', () => {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            });
            fsBtn.addEventListener('touchend', e => e.stopPropagation());

            // Keyboard pause
            window.addEventListener('keydown', e => {
                if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                    if (!active) return;
                    paused = !paused;
                    pauseBtn.textContent = paused ? '▶' : '⏸';
                }
            });

            // Visibility change — auto pause
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && active) {
                    paused = true;
                    pauseBtn.textContent = '▶';
                }
            });
        }

        // ───── Start ─────
        function startGame() {
            sfx.init();
            active = true;
            paused = false;
            score = 0; level = 1; lives = 3;
            spawnChance = 0.03; nextLevelScore = 2500; fireRate = 180;
            enemies = []; bullets = []; particles = [];
            scoreEl.innerText = score;
            levelEl.innerText = level;
            livesEl.innerText = lives;
            overlay.style.display = 'none';
            statsEl.style.display = 'none';
            pauseBtn.textContent = '⏸';
            player.x = w / 2;
            player.y = h - (isMobile ? 130 : 100);
            player.tx = player.x;
            player.ty = player.y;
        }

        // ───── Init ─────
        function init() {
            player = new Player();
            stars = Array(isMobile ? 80 : 120).fill(0).map(() => ({
                x: Math.random() * w,
                y: Math.random() * h,
                s: 0.5 + Math.random() * 2
            }));

            initControls();
            startBtn.addEventListener('click', startGame);
            startBtn.addEventListener('touchend', e => { e.stopPropagation(); });
            loop(0);
        }

        // ───── Game Loop ─────
        function loop(timestamp) {
            ctx2d.fillStyle = '#00081a';
            ctx2d.fillRect(0, 0, w, h);

            // Stars
            stars.forEach(s => {
                ctx2d.fillStyle = 'rgba(255,255,255,0.8)';
                ctx2d.fillRect(s.x, s.y, 2, 2);
                if (!paused) {
                    s.y += s.s;
                    if (s.y > h) { s.y = 0; s.x = Math.random() * w; }
                }
            });

            if (active) {
                if (paused) {
                    // Draw pause overlay
                    player.draw();
                    enemies.forEach(e => e.draw());
                    bullets.forEach(b => {
                        ctx2d.fillStyle = '#00f2ff';
                        ctx2d.shadowBlur = 10; ctx2d.shadowColor = '#00f2ff';
                        ctx2d.fillRect(b.x - 2, b.y, 4, 15 * getScale());
                    });
                    ctx2d.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx2d.fillRect(0, 0, w, h);
                    ctx2d.fillStyle = '#00f2ff';
                    ctx2d.font = `bold ${clampFont(2, 6, 3)}px Orbitron`;
                    ctx2d.textAlign = 'center';
                    ctx2d.shadowBlur = 20; ctx2d.shadowColor = '#00f2ff';
                    ctx2d.fillText('PAUSED', w / 2, h / 2);
                    ctx2d.font = `${clampFont(0.6, 2.5, 1)}px Orbitron`;
                    ctx2d.fillStyle = '#aaa';
                    ctx2d.shadowBlur = 0;
                    ctx2d.fillText('TAP PAUSE TO RESUME', w / 2, h / 2 + 40);
                    requestAnimationFrame(loop);
                    return;
                }

                player.update();
                player.draw();

                // Spawn enemies
                if (Math.random() < spawnChance) enemies.push(new Enemy());

                // Auto fire
                if (timestamp - lastShotTime > fireRate) {
                    shoot();
                    lastShotTime = timestamp;
                }

                const s = getScale();

                // Update enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    e.update();
                    e.draw();

                    // Collision with player
                    if (Math.hypot(e.x - player.x, e.y - player.y) < (e.w + 20 * s)) {
                        enemies.splice(i, 1);
                        lives--;
                        livesEl.innerText = lives;
                        createExplosion(player.x, player.y, '#00f2ff');
                        if (lives <= 0) gameOver();
                        continue;
                    }

                    // Bullet hits
                    let destroyed = false;
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        const b = bullets[j];
                        if (Math.hypot(e.x - b.x, e.y - b.y) < (e.w + 10 * s)) {
                            e.hp--;
                            bullets.splice(j, 1);
                            if (e.hp <= 0) {
                                enemies.splice(i, 1);
                                score += (e.type === 'basic' ? 100 : 250);
                                scoreEl.innerText = score;
                                createExplosion(e.x, e.y, e.color);
                                if (score >= nextLevelScore) triggerLevelUp();
                                destroyed = true;
                                break;
                            }
                        }
                    }
                    if (destroyed) continue;

                    // Off screen
                    if (e.y > h + 50) enemies.splice(i, 1);
                }

                // Update bullets
                const bulletSpeed = 12 * s;
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.y -= bulletSpeed;
                    ctx2d.fillStyle = '#00f2ff';
                    ctx2d.shadowBlur = 10;
                    ctx2d.shadowColor = '#00f2ff';
                    ctx2d.fillRect(b.x - 2 * s, b.y, 4 * s, 15 * s);
                    if (b.y < -50) bullets.splice(i, 1);
                }

                // Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.sx; p.y += p.sy; p.a -= 0.02;
                    ctx2d.globalAlpha = p.a;
                    ctx2d.fillStyle = p.c;
                    ctx2d.beginPath();
                    ctx2d.arc(p.x, p.y, 3 * s, 0, 7);
                    ctx2d.fill();
                    ctx2d.globalAlpha = 1;
                    if (p.a <= 0) particles.splice(i, 1);
                }
            }

            requestAnimationFrame(loop);
        }

        // Helper: clamp font size (rem to px based on vw)
        function clampFont(minRem, maxVw, midRem) {
            const vw = w / 100;
            const min = minRem * 16;
            const mid = maxVw * vw;
            const max = midRem * 16;
            return Math.min(Math.max(min, mid), max * 2);
        }

        // ───── Service Worker ─────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // Prevent pull-to-refresh on mobile
        document.body.addEventListener('touchmove', e => {
            if (e.touches.length === 1) e.preventDefault();
        }, { passive: false });

        init();
    </script>
</body>
</html>
